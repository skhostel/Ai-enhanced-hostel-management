name: Django Tests & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_hostel_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django coverage
    
    - name: Create .env file
      run: |
        echo "SECRET_KEY=test-secret-key-for-ci" > .env
        echo "DEBUG=True" >> .env
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_hostel_db" >> .env
        echo "USE_SQLITE=false" >> .env
      working-directory: hostel_pg_system
    
    - name: Run migrations
      run: python manage.py migrate
      working-directory: hostel_pg_system
    
    - name: Run Django tests
      run: python manage.py test
      working-directory: hostel_pg_system
    
    - name: Run coverage tests
      run: |
        coverage run --source='.' manage.py test
        coverage report
      working-directory: hostel_pg_system
    
    - name: Collect static files
      run: python manage.py collectstatic --noinput
      working-directory: hostel_pg_system
    
    - name: Check code quality (optional)
      run: |
        pip install flake8
        flake8 management --max-line-length=120 --exclude=migrations
      working-directory: hostel_pg_system
      continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Vercel
      uses: BeryJu/vercel-action@master
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
